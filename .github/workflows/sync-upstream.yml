name: Sync with Upstream

on:
  # Permite execução manual
  workflow_dispatch:
  
  # Executa diariamente às 2h UTC (23h BRT)
  schedule:
    - cron: '0 2 * * *'
  
  # Executa quando há push na main
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Configure Git
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
    
    - name: Add upstream remote
      run: |
        git remote add upstream https://github.com/kortix-ai/suna.git || true
        git remote -v
    
    - name: Fetch upstream
      run: git fetch upstream
    
    - name: Merge upstream/main
      run: |
        git checkout main
        git merge upstream/main --no-edit --allow-unrelated-histories || {
          echo "::warning::Merge conflict detected. Manual intervention required."
          exit 0
        }
    
    - name: Push changes
      run: |
        if git diff --quiet origin/main; then
          echo "No changes to push"
        else
          git push origin main
          echo "::notice::Successfully synced with upstream"
        fi
    
    - name: Create sync report
      if: success()
      run: |
        echo "## Sync Report" >> $GITHUB_STEP_SUMMARY
        echo "- Repository synced at: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- Upstream: kortix-ai/suna" >> $GITHUB_STEP_SUMMARY
        echo "- Branch: main" >> $GITHUB_STEP_SUMMARY
        
        # Mostra últimos commits do upstream
        echo "### Latest upstream commits:" >> $GITHUB_STEP_SUMMARY
        git log upstream/main --oneline -n 5 >> $GITHUB_STEP_SUMMARY